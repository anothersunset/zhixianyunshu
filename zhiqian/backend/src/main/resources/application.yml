server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: zhiqian-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zhiqian}
    username: ${SPRING_DATASOURCE_USERNAME:zhiqian}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    ttl-minutes: ${APP_JWT_TTL_MINUTES:60}
  admin:
    password: ${APP_ADMIN_PASSWORD}
  rag:
    base-url: ${APP_RAG_BASE_URL:http://localhost:8001}
  # ===== v2-step-02: LLM 接入配置 =====
  llm:
    provider: ${LLM_PROVIDER:deepseek}
    api-key: ${LLM_API_KEY:}
    base-url: ${LLM_BASE_URL:https://api.deepseek.com/v1}
    chat-model: ${LLM_CHAT_MODEL:deepseek-chat}
    reasoner-model: ${LLM_REASONER_MODEL:deepseek-reasoner}
    temperature: ${LLM_TEMPERATURE:0.2}
    max-tokens: ${LLM_MAX_TOKENS:2048}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:60}
    thinking-enabled: ${LLM_THINKING_ENABLED:true}
    reasoning-effort: ${LLM_REASONING_EFFORT:high}
  # ===== v2-step-08: Langfuse 后端全链观测 =====
  langfuse:
    enabled: ${LANGFUSE_ENABLED:true}
    host: ${LANGFUSE_HOST:https://cloud.langfuse.com}
    public-key: ${LANGFUSE_PUBLIC_KEY:}
    secret-key: ${LANGFUSE_SECRET_KEY:}
  # ===== v2-step-14: Temporal durable workflow =====
  # enabled=false (默认) 时不装载任何 Temporal bean, 原 AgentRunner 路径完全不变。
  # 启用后必需 docker compose --profile temporal up 拉起 temporal-server。
  temporal:
    enabled: ${TEMPORAL_ENABLED:false}
    service-target: ${TEMPORAL_TARGET:127.0.0.1:7233}
    namespace: ${TEMPORAL_NAMESPACE:default}
    task-queue: ${TEMPORAL_TASK_QUEUE:zhiqian-migration}
    workflow-execution-timeout-minutes: ${TEMPORAL_WF_TIMEOUT_MIN:60}
    activity-start-to-close-timeout-seconds: ${TEMPORAL_ACT_TIMEOUT_SEC:600}
    activity-max-attempts: ${TEMPORAL_ACT_MAX_ATTEMPTS:3}
    worker-concurrent-activity-execution-size: ${TEMPORAL_WORKER_CONCURRENCY:8}

logging:
  level:
    root: INFO
    com.zhiqian: DEBUG
