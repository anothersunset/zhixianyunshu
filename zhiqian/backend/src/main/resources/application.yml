server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: zhiqian-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zhiqian}
    username: ${SPRING_DATASOURCE_USERNAME:zhiqian}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    ttl-minutes: ${APP_JWT_TTL_MINUTES:60}
  admin:
    password: ${APP_ADMIN_PASSWORD}
  rag:
    base-url: ${APP_RAG_BASE_URL:http://localhost:8001}

logging:
  level:
    root: INFO
    com.zhiqian: DEBUG
