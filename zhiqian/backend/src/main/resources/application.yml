server:
  port: 8080
spring:
  application:
    name: zhiqian-backend
  datasource:
    url: jdbc:mysql://localhost:3306/zhiqian?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: zhiqian
    password: zhiqian
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
zhiqian:
  jwt:
    secret: please-change-in-prod-32-bytes-min
    expire-hours: 24
  rag:
    base-url: http://localhost:8001
  analyzer:
    workspace: ./workspace
  llm:
    default-provider: glm
