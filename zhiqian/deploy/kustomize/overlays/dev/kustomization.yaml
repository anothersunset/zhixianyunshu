# v2-step-18: dev overlay - 轻量化 单副本 NodePort
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: zhiqian-dev
resources:
  - ../../base
namePrefix: dev-
commonLabels:
  env: dev
replicas:
  - name: zhiqian-backend
    count: 1
  - name: zhiqian-rag
    count: 1
  - name: zhiqian-web
    count: 1
patches:
  - target:
      kind: Service
      name: zhiqian-web
    patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30080
  - target:
      kind: Service
      name: zhiqian-backend
    patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30880
  - target:
      kind: Deployment
      name: zhiqian-rag
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
images:
  - name: zhiqian/backend
    newTag: dev
  - name: zhiqian/rag
    newTag: dev
  - name: zhiqian/web
    newTag: dev
