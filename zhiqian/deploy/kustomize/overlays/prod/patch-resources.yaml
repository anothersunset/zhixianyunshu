# v2-step-18: prod 资源 strategic merge patch (提 backend/rag/web 限额)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zhiqian-backend
spec:
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 3000m
              memory: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zhiqian-rag
spec:
  template:
    spec:
      containers:
        - name: rag
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 6Gi
