# v2-step-18: rag FastAPI Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zhiqian-rag
  labels:
    app.kubernetes.io/name: rag
    app.kubernetes.io/component: retrieval
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: rag
      app.kubernetes.io/component: retrieval
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag
        app.kubernetes.io/component: retrieval
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: rag
          image: zhiqian/rag:2.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: zhiqian-rag-env
          env:
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zhiqian-backend-secret
                  key: deepseek-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 4Gi
