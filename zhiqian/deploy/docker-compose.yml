name: zhiqian

services:
  postgres:
    image: postgres:16-alpine
    container_name: zhiqian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zhiqian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      POSTGRES_DB: zhiqian
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./init-temporal-db.sql:/docker-entrypoint-initdb.d/10_temporal.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhiqian -d zhiqian"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: zhiqian-qdrant
    restart: unless-stopped
    profiles: ["ml"]
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "bash", "-c", "timeout 1 bash -c '</dev/tcp/127.0.0.1/6333' && echo ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  # v2-step-14: Temporal server (auto-setup, 依赖 postgres)
  # 启动方式: docker compose --profile temporal up -d
  # 需要在 .env 中设置 TEMPORAL_ENABLED=true 让 backend 连这里
  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: zhiqian-temporal
    restart: unless-stopped
    profiles: ["temporal"]
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: zhiqian
      POSTGRES_PWD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: zhiqian-temporal-ui
    restart: unless-stopped
    profiles: ["temporal"]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://localhost:8233
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zhiqian-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zhiqian
      SPRING_DATASOURCE_USERNAME: zhiqian
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      APP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:?请在 .env 中设置 ADMIN_PASSWORD}
      APP_RAG_BASE_URL: http://rag:8001
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-deepseek-chat}
      LLM_REASONER_MODEL: ${LLM_REASONER_MODEL:-deepseek-reasoner}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2048}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      # v2-step-08: Langfuse 后端全链观测。留空即 disabled
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      # v2-step-14: Temporal durable workflow。默认 false。
      # TEMPORAL_ENABLED=true 且 docker compose --profile temporal up 后才走 Temporal 路径。
      TEMPORAL_ENABLED: ${TEMPORAL_ENABLED:-false}
      TEMPORAL_TARGET: ${TEMPORAL_TARGET:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-zhiqian-migration}
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx768m"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  rag:
    build:
      context: ../rag
      dockerfile: Dockerfile
      args:
        BUILD_ML: ${RAG_BUILD_ML:-0}
    container_name: zhiqian-rag
    restart: unless-stopped
    environment:
      ZHIQIAN_RAG_CHROMA_PATH: /data/.chroma
      RAG_USE_BGE_M3: ${RAG_USE_BGE_M3:-true}
      RAG_BGE_MODEL: ${RAG_BGE_MODEL:-BAAI/bge-m3}
      RAG_BGE_FP16: ${RAG_BGE_FP16:-true}
      RAG_USE_RERANKER: ${RAG_USE_RERANKER:-true}
      RAG_RERANKER_MODEL: ${RAG_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      RAG_RERANKER_FP16: ${RAG_RERANKER_FP16:-true}
      RAG_EMBEDDING_DIM: ${RAG_EMBEDDING_DIM:-1024}
      RAG_USE_QDRANT: ${RAG_USE_QDRANT:-true}
      RAG_QDRANT_URL: ${RAG_QDRANT_URL:-http://qdrant:6333}
      RAG_QDRANT_API_KEY: ${RAG_QDRANT_API_KEY:-}
      RAG_RRF_K: ${RAG_RRF_K:-60}
      RAG_CHUNK_STRATEGY: ${RAG_CHUNK_STRATEGY:-semantic}
      RAG_CHUNK_SIM_THRESHOLD: ${RAG_CHUNK_SIM_THRESHOLD:-0.62}
      RAG_CHUNK_MAX_CHARS: ${RAG_CHUNK_MAX_CHARS:-1200}
      RAG_LATE_CHUNK_MAX_CHARS: ${RAG_LATE_CHUNK_MAX_CHARS:-600}
      RAG_LATE_CHUNK_OVERLAP: ${RAG_LATE_CHUNK_OVERLAP:-80}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    volumes:
      - ragdata:/data
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: zhiqian-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - rag

volumes:
  pgdata:
  ragdata:
  qdrantdata:
