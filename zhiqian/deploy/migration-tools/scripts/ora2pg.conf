# v2-step-22: Ora2Pg 示例配置 (Oracle HR → openGauss)
# 使用: docker exec ora2pg ora2pg -c /scripts/ora2pg.conf -t TABLE -o /output/tables.sql

ORACLE_HOME    /usr/lib/oracle/21/client64
ORACLE_DSN     dbi:Oracle:host=host.docker.internal;sid=ORCLPDB1;port=1521
ORACLE_USER    hr
ORACLE_PWD     oracle

SCHEMA         HR
TYPE           TABLE

OUTPUT         /output/output.sql
FILE_PER_TABLE 1
FILE_PER_INDEX 1
FILE_PER_CONSTRAINT 1
FILE_PER_FKEYS 1

PLSQL_PGSQL    1
MODIFY_TYPE    NUMBER:numeric,DATE:timestamp,CLOB:text,BLOB:bytea
TRUNCATE_TABLE 1

PG_VERSION     16
PG_SUPPORTS_PARTITION 1
PG_SUPPORTS_MVIEW     1
