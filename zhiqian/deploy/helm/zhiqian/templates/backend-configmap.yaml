- if .Values.backend.enabled 
apiVersion: v1
kind: ConfigMap
metadata:
  name:  include "zhiqian.fullname" . -backend
  labels:
    - include "zhiqian.labels" . | nindent 4 
    app.kubernetes.io/component: backend
data:
  application.yaml: |
    spring:
      datasource:
        url: jdbc:postgresql:// include "zhiqian.fullname" . -postgres: .Values.postgres.service.port / .Values.postgres.auth.database 
        username:  .Values.postgres.auth.username 
        password: ${SPRING_DATASOURCE_PASSWORD}
      flyway:
        enabled: true
        baseline-on-migrate: true
    server:
      port: 8080
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics
      endpoint:
        health:
          probes:
            enabled: true
    app:
      jwt:
        secret: ${APP_JWT_SECRET}
        expire-minutes: 1440
      llm:
        provider:  .Values.backend.config.llm.provider 
        api-key: ${APP_LLM_API_KEY}
        base-url:  .Values.backend.config.llm.baseUrl 
        chat-model:  .Values.backend.config.llm.chatModel 
        reasoner-model:  .Values.backend.config.llm.reasonerModel 
        temperature:  .Values.backend.config.llm.temperature 
        max-tokens:  .Values.backend.config.llm.maxTokens 
        timeout-seconds:  .Values.backend.config.llm.timeoutSeconds 
      langfuse:
        enabled:  .Values.backend.config.langfuse.enabled 
        host:  .Values.backend.config.langfuse.host 
        public-key: ${APP_LANGFUSE_PUBLIC_KEY}
        secret-key: ${APP_LANGFUSE_SECRET_KEY}
      temporal:
        enabled:  .Values.backend.config.temporal.enabled 
        service-target:  .Values.backend.config.temporal.serviceTarget 
        namespace:  .Values.backend.config.temporal.namespace 
        task-queue:  .Values.backend.config.temporal.taskQueue 
- end 
