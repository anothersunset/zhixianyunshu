- if .Values.backend.enabled 
apiVersion: apps/v1
kind: Deployment
metadata:
  name:  include "zhiqian.fullname" . -backend
  labels:
    - include "zhiqian.labels" . | nindent 4 
    app.kubernetes.io/component: backend
spec:
  replicas:  .Values.backend.replicaCount 
  selector:
    matchLabels:
      - include "zhiqian.selectorLabels" (merge (dict "component" "backend") .) | nindent 6 
  template:
    metadata:
      labels:
        - include "zhiqian.selectorLabels" (merge (dict "component" "backend") .) | nindent 8 
      annotations:
        checksum/config:  include (print $.Template.BasePath "/backend-configmap.yaml") . | sha256sum 
        checksum/secret:  include (print $.Template.BasePath "/backend-secret.yaml") . | sha256sum 
    spec:
      serviceAccountName:  include "zhiqian.serviceAccountName" . 
      - with .Values.global.imagePullSecrets 
      imagePullSecrets:
        - toYaml . | nindent 8 
      - end 
      securityContext:
        - toYaml .Values.backend.podSecurityContext | nindent 8 
      containers:
        - name: backend
          image:  include "zhiqian.image" (dict "global" .Values.global "image" .Values.backend.image "appVersion" .Chart.AppVersion) 
          imagePullPolicy:  .Values.backend.image.pullPolicy 
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_CONFIG_LOCATION
              value: classpath:/application.yml,/etc/zhiqian/application.yaml
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name:  include "zhiqian.fullname" . -backend
                  key: postgres-password
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name:  include "zhiqian.fullname" . -backend
                  key: jwt-secret
            - name: APP_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name:  include "zhiqian.fullname" . -backend
                  key: deepseek-api-key
            - name: APP_LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name:  include "zhiqian.fullname" . -backend
                  key: langfuse-public-key
            - name: APP_LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name:  include "zhiqian.fullname" . -backend
                  key: langfuse-secret-key
          volumeMounts:
            - name: config
              mountPath: /etc/zhiqian
              readOnly: true
          livenessProbe:
            - toYaml .Values.backend.livenessProbe | nindent 12 
          readinessProbe:
            - toYaml .Values.backend.readinessProbe | nindent 12 
          resources:
            - toYaml .Values.backend.resources | nindent 12 
      volumes:
        - name: config
          configMap:
            name:  include "zhiqian.fullname" . -backend
      - with .Values.backend.nodeSelector 
      nodeSelector:
        - toYaml . | nindent 8 
      - end 
      - with .Values.backend.tolerations 
      tolerations:
        - toYaml . | nindent 8 
      - end 
      - with .Values.backend.affinity 
      affinity:
        - toYaml . | nindent 8 
      - end 
- end 
