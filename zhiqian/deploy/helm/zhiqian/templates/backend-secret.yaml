- if .Values.backend.enabled 
apiVersion: v1
kind: Secret
metadata:
  name:  include "zhiqian.fullname" . -backend
  labels:
    - include "zhiqian.labels" . | nindent 4 
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  jwt-secret:  .Values.backend.secrets.jwtSecret | quote 
  deepseek-api-key:  .Values.backend.secrets.deepseekApiKey | quote 
  langfuse-public-key:  .Values.backend.secrets.langfusePublicKey | quote 
  langfuse-secret-key:  .Values.backend.secrets.langfuseSecretKey | quote 
  postgres-password:  .Values.postgres.auth.password | quote 
- end 
