# v2-step-20: 独立 vLLM Deployment (选型 B, 不走 Ray)
# 部署后 backend 设 app.llm.base-url=http://vllm.zhiqian.svc.cluster.local:8000/v1
# vLLM 兼容 OpenAI API, 复用现有 DeepseekLlmClient 即可
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
  namespace: zhiqian
  labels:
    app: vllm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: zhiqian
  labels:
    app: vllm
spec:
  replicas: 1
  strategy:
    type: Recreate    # GPU 独占, 不走 rolling
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      runtimeClassName: nvidia    # 默认 containerd nvidia runtime
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.6.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          args:
            - --model
            - Qwen/Qwen2.5-7B-Instruct
            - --served-model-name
            - Qwen/Qwen2.5-7B-Instruct
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --max-model-len
            - "16384"
            - --gpu-memory-utilization
            - "0.85"
            - --enforce-eager    # 避免 torch.compile 启动慢 (生产可去)
            - --download-dir
            - /models
          env:
            - name: HF_ENDPOINT
              value: https://hf-mirror.com
            - name: HF_HOME
              value: /models
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "4"
              memory: 24Gi
            requests:
              nvidia.com/gpu: 1
              cpu: "2"
              memory: 16Gi
          volumeMounts:
            - name: models
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 60     # 30 min 拉模型窗口
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: zhiqian
  labels:
    app: vllm
spec:
  type: ClusterIP
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
