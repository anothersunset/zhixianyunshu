# v2-step-31: 供应链安全 — Syft SBOM + Cosign keyless + Trivy fs/image
# 手动拷到仓库根 .github/workflows/supply-chain.yml 后即生效。
name: supply-chain

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  sbom-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: ./zhiqian
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

      - name: Trivy fs scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: ./zhiqian
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.0'

      - name: Cosign sign SBOM (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign-blob --yes \
            --output-signature sbom.cdx.json.sig \
            --output-certificate sbom.cdx.json.pem \
            sbom.cdx.json

      - name: Upload signature bundle
        uses: actions/upload-artifact@v4
        with:
          name: sbom-signature
          path: |
            sbom.cdx.json.sig
            sbom.cdx.json.pem
          retention-days: 90

  build-and-sign-images:
    needs: sbom-and-scan
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        component: [backend, rag, web]
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: $ github.repository_owner 
          password: $ secrets.GITHUB_TOKEN 
      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./zhiqian/$ matrix.component 
          push: true
          tags: ghcr.io/$ github.repository /$ matrix.component :$ github.ref_name 
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Cosign sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: cosign sign --yes ghcr.io/$ github.repository /$ matrix.component @$ steps.build.outputs.digest 
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/$ github.repository /$ matrix.component :$ github.ref_name 
          format: sarif
          output: trivy-$ matrix.component .sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-$ matrix.component .sarif
          category: trivy-image-$ matrix.component 
