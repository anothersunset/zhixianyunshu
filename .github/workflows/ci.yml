name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zhiqian/backend
    strategy:
      matrix:
        java-version: ["17"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('zhiqian/backend/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Build
        run: mvn compile -q

      - name: Run tests
        run: mvn test -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zhiqian/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
